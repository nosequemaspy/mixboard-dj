app = "mixboard-dj"
primary_region = "mia"

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "mixboard_data"
  destination = "/app/storage"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
